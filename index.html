<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StrawHatDraws TCG Sales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .zoom-container { position: relative; overflow: hidden; cursor: zoom-in; }
        .zoom-image { transition: transform 0.1s ease-out; transform-origin: center center; will-change: transform, transform-origin; }
        .zoom-container:hover .zoom-image { transform: scale(2.2); cursor: crosshair; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #121212; }
        ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #ef4444; }
    </style>
</head>
<body class="bg-[#121212] text-gray-100 font-sans min-h-screen flex flex-col">

    <nav class="bg-[#1e1e1e] border-b border-gray-800 sticky top-0 z-50 px-4 py-3 shadow-md">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-red-600 p-2 rounded-lg text-white font-black tracking-tighter">SHD</div>
                <h1 class="text-xl font-bold tracking-tight bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">
                    StrawHatDraws <span class="text-red-500 font-light text-sm tracking-wider uppercase border border-red-500/30 px-1.5 py-0.5 rounded ml-1">TCG Sales</span>
                </h1>
            </div>
            <div class="flex items-center gap-3 w-full sm:w-auto justify-end">
                <div class="relative flex-1 sm:w-64">
                    <input type="text" id="search-input" placeholder="Search by name or set code..." class="w-full bg-[#2a2a2a] border border-gray-700 rounded-lg pl-9 pr-4 py-1.5 text-sm text-gray-200 focus:outline-none focus:border-red-500 transition-colors">
                    <i data-lucide="search" class="absolute left-3 top-2 w-4 h-4 text-gray-400"></i>
                </div>
                <button onclick="openCheckoutModal()" class="relative bg-red-600 hover:bg-red-700 text-white px-4 py-1.5 rounded-lg text-sm font-semibold flex items-center gap-2 transition-colors shadow">
                    <i data-lucide="shopping-cart" class="w-4 h-4"></i>
                    <span>Checkout</span>
                    <span id="cart-count" class="bg-black/30 text-white text-xs font-bold px-1.5 py-0.5 rounded-full">0</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl w-full mx-auto p-4 flex-1">
        <main>
            <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4"></div>
        </main>
    </div>

    <div id="admin-modal" style="display: none;" class="fixed inset-0 bg-black/95 backdrop-blur-md items-center justify-center z-50 p-4">
        <div class="bg-[#1e1e1e] border border-gray-800 rounded-xl max-w-6xl w-full p-6 shadow-2xl max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-sm font-bold text-red-500">Encrypted Server Admin Console</h2>
                <button onclick="closeAdminPanel()" class="bg-gray-800 p-2 rounded text-xs">Close</button>
            </div>
            <div id="admin-auth-gate" class="text-center py-12">
                <input type="email" id="admin-email-input" placeholder="Admin Email" class="bg-[#2a2a2a] p-2 mb-2 w-full max-w-xs text-xs block mx-auto">
                <input type="password" id="admin-pass-input" placeholder="Password" class="bg-[#2a2a2a] p-2 mb-4 w-full max-w-xs text-xs block mx-auto">
                <button onclick="verifyAdminAuth()" class="bg-red-600 px-6 py-2 rounded text-xs">Establish Sync</button>
            </div>
            <div id="admin-workspace" class="hidden">
                <table class="w-full text-xs text-left">
                    <thead><tr class="text-gray-400 border-b border-gray-800"><th class="p-3">Customer</th><th class="p-3">Address</th><th class="p-3">Status</th><th class="p-3">Action</th></tr></thead>
                    <tbody id="admin-orders-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <footer class="text-center text-[10px] py-6 text-gray-600"><span onclick="openAdminPanel()" class="cursor-pointer">[🛡️ Admin Access]</span></footer>

    <script>
        const SUPABASE_URL = "https://vyojxqeokzdjicjxtqgv.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ5b2p4cWVva3pkamljanh0cWd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMTU1NzUsImV4cCI6MjA5Nzc5MTU3NX0.Y0SpmB4EpGxEz446gZwPFZHVa2_UiIgJLWXEZYxRhBs";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        window.openAdminPanel = () => document.getElementById('admin-modal').style.display = 'flex';
        window.closeAdminPanel = () => document.getElementById('admin-modal').style.display = 'none';

        window.verifyAdminAuth = async () => {
            const email = document.getElementById('admin-email-input').value;
            const password = document.getElementById('admin-pass-input').value;
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if(error) return alert(error.message);
            document.getElementById('admin-auth-gate').classList.add('hidden');
            document.getElementById('admin-workspace').classList.remove('hidden');
            renderAdminOrdersLedger();
        };

        async function renderAdminOrdersLedger() {
            const tbody = document.getElementById('admin-orders-tbody');
            tbody.innerHTML = '';
            let { data } = await supabaseClient.from('Orders').select('*');
            if(data) {
                data.forEach(ord => {
                    const tr = document.createElement('tr');
                    tr.className = "border-b border-gray-800";
                    tr.innerHTML = `
                        <td class="p-3">${ord.customer_name}</td>
                        <td class="p-3">${ord.shipping_address}</td>
                        <td class="p-3">
                            <select onchange="updateOrderStatus('${ord.id}', this.value)" class="bg-[#2a2a2a] p-1 rounded">
                                <option value="Pending" ${ord.order_status === 'Pending' ? 'selected' : ''}>Pending</option>
                                <option value="Processed" ${ord.order_status === 'Processed' ? 'selected' : ''}>Processed</option>
                                <option value="Shipped" ${ord.order_status === 'Shipped' ? 'selected' : ''}>Shipped</option>
                            </select>
                        </td>
                        <td class="p-3"><button onclick="purgeOrder('${ord.id}')" class="text-red-500">Delete</button></td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        }

        window.updateOrderStatus = async (id, status) => {
            await supabaseClient.from('Orders').update({ order_status: status }).eq('id', id);
            alert("Updated to " + status);
        };

        window.purgeOrder = async (id) => {
            await supabaseClient.from('Orders').delete().eq('id', id);
            renderAdminOrdersLedger();
        };
    </script>
</body>
</html>
